
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBot Perú - Panel de Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://smartbotperu.com/logo.png">
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen p-4">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-sky-400">SmartBot Perú 📈</h1>
            <div id="auth-section" class="flex gap-2">
                <input type="password" id="admin-pass" placeholder="Clave de acceso" class="bg-slate-800 border border-slate-600 rounded px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
                <button onclick="loadLeads()" class="bg-sky-600 hover:bg-sky-500 px-4 py-1 rounded text-sm font-bold transition">Acceder</button>
            </div>
        </header>

        <div class="bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-700 text-sky-300 uppercase text-xs tracking-wider">
                            <th class="px-6 py-4 font-bold">Fecha</th>
                            <th class="px-6 py-4 font-bold">WhatsApp</th>
                            <th class="px-6 py-4 font-bold">Nombre</th>
                            <th class="px-6 py-4 font-bold">Consulta</th>
                            <th class="px-6 py-4 font-bold">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table" class="divide-y divide-slate-700">
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-slate-500 italic">
                                Ingresa la clave para cargar los leads de whatsbot_leads...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadLeads() {
            const password = document.getElementById('admin-pass').value;
            const tableBody = document.getElementById('leads-table');

            if (!password) {
                alert("Por favor, ingresa la clave de administrador.");
                return;
            }

            tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-sky-400 animate-pulse">Conectando con Netlify...</td></tr>';

            try {
                // ✅ SOLUCIÓN: Ruta específica para Netlify Functions
                const response = await fetch('/.netlify/functions/leads', {
                    headers: {
                        'Authorization': password
                    }
                });

                if (!response.ok) {
                    throw new Error(response.status === 401 ? 'Clave incorrecta' : 'Error de conexión');
                }

                const leads = await response.json();

                if (!leads || leads.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-slate-400">No hay leads registrados en whatsbot_leads.</td></tr>';
                    return;
                }

                tableBody.innerHTML = '';
                leads.forEach(lead => {
                    // Mapeo exacto de los campos de tu tabla whatsbot_leads
                    const row = `
                        <tr class="hover:bg-slate-700/50 transition border-b border-slate-700">
                            <td class="px-6 py-4 text-sm text-slate-400">${new Date(lead.created_at).toLocaleDateString()}</td>
                            <td class="px-6 py-4 font-medium text-sky-400">${lead.phone || lead.wa_id || 'S/N'}</td>
                            <td class="px-6 py-4 text-sm">${lead.name || 'Sin nombre'}</td>
                            <td class="px-6 py-4 text-sm text-slate-300">${lead.query || lead.interest || 'Pendiente'}</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 bg-green-900/30 text-green-400 text-xs rounded-full border border-green-800">WhatsApp</span>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

            } catch (error) {
                console.error('Error:', error);
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-red-400">❌ Error: ${error.message}</td></tr>`;
            }
        }
    </script>
</body>
</html>
